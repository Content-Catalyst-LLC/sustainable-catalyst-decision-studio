name: Release validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.11'
      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt
      - name: Run backend regression suite
        working-directory: backend
        run: python -m pytest
      - name: Run release integrity checks
        run: python scripts/test_release.py
      - name: Validate WordPress PHP
        run: php -l wordpress-plugin/sustainable-catalyst-decision-studio/sustainable-catalyst-decision-studio.php
