services:
  - type: web
    name: sustainable-catalyst-decision-studio
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SCDS_BUILD_FINGERPRINT
        value: scds-v1.9.0-decision-governance
      - key: SCDS_SOURCE_COMMIT
        value: release-v1.9.0
      - key: SCDS_MAX_REQUEST_BYTES
        value: 1048576
      - key: SCDS_PUBLIC_RATE_LIMIT
        value: 60
